<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Delivery For You! 🎁</title>
    <style>
        :root{
            --card-bg: rgba(255,250,244,0.86);
            --ink: #3e352f;
            --muted: #6f5f57;
            --accent: #c33b3b;
        }

        *{box-sizing: border-box}
        html,body{height:100%;margin:0}

        body{
            font-family: Georgia, 'Times New Roman', serif;
            color:var(--ink);
            display:flex;
            align-items:center;
            justify-content:center;
            background:
                linear-gradient(rgba(255,255,255,0.22), rgba(255,255,255,0.22)),
                url('assets/download%20(7).jpg') ;
                 background-repeat: no-repeat, no-repeat;
            background-size: cover, cover;
            background-position: center top , center;
            overflow: hidden;
            position: relative;
            color: var(--ink);
        }

        .card-wrap{
            width:min(92vw,720px);
            padding:36px 28px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            width:100%;
            max-width:520px;
            background: var(--card-bg);
            border-radius:22px;
            padding:30px 26px;
            box-shadow:0 18px 40px rgba(34,20,16,0.14);
            border:1px solid rgba(56,40,36,0.06);
            text-align:center;
        }

        h1{margin:6px 0 12px;font-size:2.2rem;color:var(--accent)}
        p{margin:0 0 18px;color:var(--muted);line-height:1.6}

        .cta{
            display:inline-block;
            padding:10px 18px;border-radius:999px;background:#5a3f3f;color:#fff;text-decoration:none;font-weight:700;
            box-shadow:0 8px 18px rgba(50,30,24,0.14);
        }

        @media (max-width:480px){
            .card{padding:22px}
            h1{font-size:1.6rem}
        }
    </style>
</head>
<body>
    <div class="card-wrap">
        <article class="card">
            <h1>To My Love</h1>
            <p>Happy birthday — may this year bring warmth, laughter, and all the little moments that make our days brighter. I would choose you every time.</p>
            <a class="cta" href="card.html">Open Your Card</a>
        </article>
    </div>
</body>
</html>
